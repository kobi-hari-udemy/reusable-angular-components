<span>{{title()}}</span>
<div class="options-list">
  @for (option of options(); track option) {
    <div
      class="option-item"
      [class.is-selected]="selectedOption() === option"
      (click)="select(option)"
    >
    @if(hasItemTemplate()) {
      <ng-container *ngTemplateOutlet="itemTemplate(); context: {$implicit: option}"/>

    } @else {
      {{ option }}
    }
    </div>
  }
</div>
