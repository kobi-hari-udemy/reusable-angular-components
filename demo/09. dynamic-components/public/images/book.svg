<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efebe9"/>
      <stop offset="100%" stop-color="#d7ccc8"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="5%" stop-color="#d32f2f"/>
      <stop offset="95%" stop-color="#d32f2f"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#3e2723" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="16" fill="url(#bg)"/>
  <g transform="translate(200,200)" filter="url(#sh)">
    <!-- Back cover shadow -->
    <rect x="-52" y="-72" width="108" height="144" rx="4" fill="#b71c1c"/>
    <!-- Pages -->
    <rect x="-48" y="-68" width="100" height="136" rx="2" fill="#fff8e1"/>
    <rect x="-46" y="-66" width="96" height="132" rx="1" fill="#fffde7"/>
    <!-- Page lines -->
    <g stroke="#d7ccc8" stroke-width="0.8" opacity="0.6">
      <line x1="-36" y1="-48" x2="40" y2="-48"/>
      <line x1="-36" y1="-36" x2="40" y2="-36"/>
      <line x1="-36" y1="-24" x2="40" y2="-24"/>
      <line x1="-36" y1="-12" x2="40" y2="-12"/>
      <line x1="-36" y1="0" x2="40" y2="0"/>
      <line x1="-36" y1="12" x2="40" y2="12"/>
      <line x1="-36" y1="24" x2="40" y2="24"/>
      <line x1="-36" y1="36" x2="40" y2="36"/>
      <line x1="-36" y1="48" x2="40" y2="48"/>
    </g>
    <!-- Front cover -->
    <rect x="-55" y="-72" width="108" height="144" rx="4" fill="url(#cover)"/>
    <!-- Spine -->
    <rect x="-55" y="-72" width="8" height="144" rx="2" fill="#b71c1c"/>
    <line x1="-51" y1="-68" x2="-51" y2="68" stroke="#e53935" stroke-width="1" opacity="0.4"/>
    <!-- Cover decoration - title area -->
    <rect x="-30" y="-42" width="66" height="28" rx="3" fill="#b71c1c" opacity="0.4"/>
    <line x1="-20" y1="-30" x2="26" y2="-30" stroke="#ffcdd2" stroke-width="2" opacity="0.7"/>
    <line x1="-15" y1="-22" x2="20" y2="-22" stroke="#ffcdd2" stroke-width="1.5" opacity="0.5"/>
    <!-- Cover decoration - author area -->
    <line x1="-10" y1="30" x2="30" y2="30" stroke="#ffcdd2" stroke-width="1.5" opacity="0.5"/>
    <!-- Bookmark ribbon -->
    <path d="M25,-72 L25,-82 L30,-76 L35,-82 L35,-72" fill="#ffd54f"/>
    <!-- Page edges visible at bottom -->
    <line x1="-47" y1="70" x2="50" y2="70" stroke="#d7ccc8" stroke-width="2"/>
  </g>
</svg>
