<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efebe9"/>
      <stop offset="100%" stop-color="#d7ccc8"/>
    </linearGradient>
    <linearGradient id="cbody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d4c41"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="ccoffee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3e2723"/>
      <stop offset="100%" stop-color="#2c1a12"/>
    </linearGradient>
    <filter id="cshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#3e2723" flood-opacity="0.2"/>
    </filter>
    <filter id="csteam">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="16" fill="url(#cbg)"/>
  <g transform="translate(200,205)" filter="url(#cshadow)">
    <!-- Base platform -->
    <rect x="-55" y="55" width="110" height="12" rx="6" fill="#3e2723"/>
    <rect x="-50" y="55" width="100" height="8" rx="4" fill="#4e342e"/>
    <!-- Hotplate -->
    <ellipse cx="0" cy="55" rx="35" ry="5" fill="#5d4037"/>
    <!-- Carafe body -->
    <path d="M-30,53 L-35,-15 Q-35,-28 -22,-28 L22,-28 Q35,-28 35,-15 L30,53 Z" fill="url(#cbody)"/>
    <!-- Carafe glass area -->
    <path d="M-28,48 L-32,-12 Q-32,-22 -20,-22 L20,-22 Q32,-22 32,-12 L28,48 Z" fill="#8d6e63" opacity="0.4"/>
    <!-- Coffee level -->
    <path d="M-28,48 L-30,5 L30,5 L28,48 Z" fill="url(#ccoffee)" opacity="0.7"/>
    <!-- Coffee surface highlight -->
    <ellipse cx="0" cy="5" rx="28" ry="4" fill="#5d4037" opacity="0.5"/>
    <!-- Carafe spout -->
    <path d="M35,-10 L48,-18 L48,-10 Q46,-5 35,-2" fill="#6d4c41"/>
    <!-- Handle -->
    <path d="M-35,0 Q-55,0 -55,22 Q-55,45 -35,45" fill="none" stroke="#5d4037" stroke-width="8" stroke-linecap="round"/>
    <path d="M-35,8 Q-48,8 -48,22 Q-48,37 -35,37" fill="none" stroke="#4e342e" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Lid -->
    <rect x="-25" y="-35" width="50" height="10" rx="5" fill="#3e2723"/>
    <!-- Lid knob -->
    <rect x="-6" y="-42" width="12" height="8" rx="4" fill="#4e342e"/>
    <ellipse cx="0" cy="-42" rx="5" ry="2" fill="#6d4c41"/>
    <!-- Measurement lines -->
    <line x1="26" y1="15" x2="20" y2="15" stroke="#bcaaa4" stroke-width="1.5" opacity="0.5"/>
    <line x1="27" y1="25" x2="20" y2="25" stroke="#bcaaa4" stroke-width="1.5" opacity="0.5"/>
    <line x1="28" y1="35" x2="20" y2="35" stroke="#bcaaa4" stroke-width="1.5" opacity="0.5"/>
    <!-- Steam -->
    <g filter="url(#csteam)" opacity="0.4">
      <path d="M-10,-48 Q-14,-65 -8,-80 Q-4,-90 -10,-100" fill="none" stroke="#bcaaa4" stroke-width="3" stroke-linecap="round"/>
      <path d="M2,-48 Q6,-68 0,-85 Q-4,-95 2,-105" fill="none" stroke="#bcaaa4" stroke-width="3" stroke-linecap="round"/>
      <path d="M12,-46 Q16,-60 10,-75 Q6,-85 12,-92" fill="none" stroke="#bcaaa4" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
