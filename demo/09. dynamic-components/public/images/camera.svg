<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#880e4f" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="16" fill="url(#bg)"/>
  <g transform="translate(200,200)" filter="url(#sh)">
    <!-- Camera body -->
    <rect x="-80" y="-45" width="160" height="95" rx="12" fill="url(#body)"/>
    <!-- Top plate -->
    <rect x="-75" y="-55" width="150" height="15" rx="5" fill="#455a64"/>
    <!-- Viewfinder bump -->
    <rect x="-15" y="-65" width="30" height="15" rx="4" fill="#37474f"/>
    <rect x="-10" y="-62" width="20" height="9" rx="2" fill="#263238"/>
    <!-- Shutter button -->
    <circle cx="45" cy="-58" r="8" fill="#e53935"/>
    <circle cx="45" cy="-58" r="5" fill="#ef5350"/>
    <!-- Mode dial -->
    <circle cx="-40" cy="-55" r="7" fill="#455a64" stroke="#607d8b" stroke-width="1.5"/>
    <!-- Lens mount -->
    <circle cx="-10" cy="5" r="42" fill="#263238"/>
    <circle cx="-10" cy="5" r="38" fill="#1a237e" opacity="0.3"/>
    <circle cx="-10" cy="5" r="34" fill="#0d47a1" opacity="0.3"/>
    <!-- Lens glass -->
    <circle cx="-10" cy="5" r="28" fill="#1a237e"/>
    <circle cx="-10" cy="5" r="22" fill="#283593"/>
    <!-- Lens reflection -->
    <ellipse cx="-18" cy="-3" rx="8" ry="12" fill="#5c6bc0" opacity="0.25" transform="rotate(-20,-18,-3)"/>
    <circle cx="-5" cy="10" r="4" fill="#7986cb" opacity="0.15"/>
    <!-- Lens ring -->
    <circle cx="-10" cy="5" r="38" fill="none" stroke="#607d8b" stroke-width="2"/>
    <!-- Grip -->
    <rect x="55" y="-35" width="18" height="70" rx="5" fill="#455a64"/>
    <rect x="58" y="-30" width="12" height="60" rx="3" fill="#37474f"/>
    <!-- Flash -->
    <rect x="-70" y="-52" width="16" height="8" rx="2" fill="#ffca28" opacity="0.7"/>
  </g>
</svg>
