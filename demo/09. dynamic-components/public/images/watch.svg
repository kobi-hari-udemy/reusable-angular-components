<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2f1"/>
      <stop offset="100%" stop-color="#b2dfdb"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#004d40" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="16" fill="url(#bg)"/>
  <g transform="translate(200,200)" filter="url(#sh)">
    <!-- Band top -->
    <rect x="-22" y="-120" width="44" height="50" rx="6" fill="#00897b"/>
    <rect x="-18" y="-115" width="36" height="40" rx="4" fill="#00796b" opacity="0.5"/>
    <!-- Band bottom -->
    <rect x="-22" y="70" width="44" height="50" rx="6" fill="#00897b"/>
    <rect x="-18" y="75" width="36" height="40" rx="4" fill="#00796b" opacity="0.5"/>
    <!-- Case -->
    <circle cx="0" cy="0" r="70" fill="#546e7a"/>
    <circle cx="0" cy="0" r="62" fill="url(#face)"/>
    <!-- Bezel ring -->
    <circle cx="0" cy="0" r="66" fill="none" stroke="#78909c" stroke-width="2"/>
    <!-- Crown button -->
    <rect x="66" y="-6" width="12" height="12" rx="3" fill="#78909c"/>
    <!-- Watch face -->
    <circle cx="0" cy="0" r="55" fill="#1a237e" opacity="0.9"/>
    <!-- Hour markers -->
    <g stroke="#80cbc4" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-48" x2="0" y2="-42"/>
      <line x1="24" y1="-41.6" x2="21" y2="-36.4"/>
      <line x1="41.6" y1="-24" x2="36.4" y2="-21"/>
      <line x1="48" y1="0" x2="42" y2="0"/>
      <line x1="41.6" y1="24" x2="36.4" y2="21"/>
      <line x1="24" y1="41.6" x2="21" y2="36.4"/>
      <line x1="0" y1="48" x2="0" y2="42"/>
      <line x1="-24" y1="41.6" x2="-21" y2="36.4"/>
      <line x1="-41.6" y1="24" x2="-36.4" y2="21"/>
      <line x1="-48" y1="0" x2="-42" y2="0"/>
      <line x1="-41.6" y1="-24" x2="-36.4" y2="-21"/>
      <line x1="-24" y1="-41.6" x2="-21" y2="-36.4"/>
    </g>
    <!-- Hour hand -->
    <line x1="0" y1="5" x2="15" y2="-20" stroke="#e0f2f1" stroke-width="3" stroke-linecap="round"/>
    <!-- Minute hand -->
    <line x1="0" y1="5" x2="-5" y2="-38" stroke="#e0f2f1" stroke-width="2" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#80cbc4"/>
    <!-- Small digital readout -->
    <rect x="8" y="10" width="24" height="10" rx="2" fill="#0d47a1" opacity="0.5"/>
    <line x1="12" y1="15" x2="28" y2="15" stroke="#80cbc4" stroke-width="1" opacity="0.6"/>
  </g>
</svg>
