<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="bbody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f57c00"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="bpocket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bf360c"/>
      <stop offset="100%" stop-color="#8b2500"/>
    </linearGradient>
    <filter id="bshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#bf360c" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="16" fill="url(#bbg)"/>
  <g transform="translate(200,205)" filter="url(#bshadow)">
    <!-- Bag body -->
    <path d="M-48,70 L-55,-20 Q-55,-38 -40,-38 L40,-38 Q55,-38 55,-20 L48,70 Z" fill="url(#bbody)"/>
    <!-- Side panel left -->
    <path d="M-48,70 L-55,-20 Q-55,-30 -48,-35 L-48,70 Z" fill="#e65100" opacity="0.5"/>
    <!-- Side panel right -->
    <path d="M48,70 L55,-20 Q55,-30 48,-35 L48,70 Z" fill="#bf360c" opacity="0.3"/>
    <!-- Top flap -->
    <path d="M-50,-30 Q-50,-45 -35,-45 L35,-45 Q50,-45 50,-30 L48,-20 L-48,-20 Z" fill="#ef6c00"/>
    <path d="M-48,-20 L48,-20 L50,-30 Q50,-42 37,-42 L-37,-42 Q-50,-42 -50,-30 Z" fill="#f57c00" opacity="0.6"/>
    <!-- Straps -->
    <path d="M-22,-45 Q-22,-85 0,-90 Q22,-85 22,-45" fill="none" stroke="#bf360c" stroke-width="8" stroke-linecap="round"/>
    <path d="M-22,-45 Q-22,-75 -5,-82" fill="none" stroke="#d84315" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <path d="M22,-45 Q22,-75 5,-82" fill="none" stroke="#d84315" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <!-- Front pocket -->
    <rect x="-28" y="10" width="56" height="40" rx="6" fill="url(#bpocket)"/>
    <rect x="-24" y="14" width="48" height="32" rx="4" fill="#d84315" opacity="0.3"/>
    <!-- Pocket zipper -->
    <line x1="-20" y1="12" x2="20" y2="12" stroke="#ff9800" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="20" cy="12" r="3" fill="#ffb74d"/>
    <!-- Top zipper -->
    <line x1="-40" y1="-22" x2="40" y2="-22" stroke="#ff9800" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-5" cy="-22" r="3.5" fill="#ffb74d"/>
    <!-- Buckle straps -->
    <rect x="-35" y="55" width="10" height="18" rx="3" fill="#bf360c" opacity="0.6"/>
    <rect x="25" y="55" width="10" height="18" rx="3" fill="#bf360c" opacity="0.6"/>
    <rect x="-34" y="60" width="8" height="5" rx="1.5" fill="#ffb74d"/>
    <rect x="26" y="60" width="8" height="5" rx="1.5" fill="#ffb74d"/>
    <!-- Logo circle -->
    <circle cx="0" cy="30" r="8" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="30" r="4" fill="#ff9800" opacity="0.3"/>
  </g>
</svg>
