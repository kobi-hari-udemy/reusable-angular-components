<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8eaf6"/>
      <stop offset="100%" stop-color="#c5cae9"/>
    </linearGradient>
    <linearGradient id="hband" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c6bc0"/>
      <stop offset="100%" stop-color="#3949ab"/>
    </linearGradient>
    <linearGradient id="hcup" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3949ab"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <radialGradient id="hcushion">
      <stop offset="0%" stop-color="#7986cb"/>
      <stop offset="100%" stop-color="#5c6bc0"/>
    </radialGradient>
    <filter id="hshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1a237e" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="16" fill="url(#hbg)"/>
  <g transform="translate(200,200)" filter="url(#hshadow)">
    <!-- Headband -->
    <path d="M-70,-45 Q-80,-110 0,-120 Q80,-110 70,-45" fill="none" stroke="url(#hband)" stroke-width="10" stroke-linecap="round"/>
    <!-- Headband padding -->
    <path d="M-25,-115 Q0,-125 25,-115" fill="none" stroke="#7986cb" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
    <!-- Left ear cup outer -->
    <rect x="-90" y="-55" width="44" height="65" rx="14" fill="url(#hcup)"/>
    <!-- Left ear cup inner -->
    <rect x="-84" y="-49" width="32" height="53" rx="10" fill="#5c6bc0"/>
    <!-- Left cushion -->
    <ellipse cx="-68" cy="-22" rx="12" ry="20" fill="url(#hcushion)" opacity="0.7"/>
    <!-- Left highlight -->
    <ellipse cx="-74" cy="-35" rx="4" ry="8" fill="#9fa8da" opacity="0.5"/>
    <!-- Right ear cup outer -->
    <rect x="46" y="-55" width="44" height="65" rx="14" fill="url(#hcup)"/>
    <!-- Right ear cup inner -->
    <rect x="52" y="-49" width="32" height="53" rx="10" fill="#5c6bc0"/>
    <!-- Right cushion -->
    <ellipse cx="68" cy="-22" rx="12" ry="20" fill="url(#hcushion)" opacity="0.7"/>
    <!-- Right highlight -->
    <ellipse cx="62" cy="-35" rx="4" ry="8" fill="#9fa8da" opacity="0.5"/>
    <!-- Left arm connector -->
    <rect x="-76" y="-50" width="8" height="12" rx="3" fill="#283593"/>
    <!-- Right arm connector -->
    <rect x="68" y="-50" width="8" height="12" rx="3" fill="#283593"/>
    <!-- Microphone arm -->
    <path d="M-68,10 Q-72,40 -60,55" fill="none" stroke="#3949ab" stroke-width="3" stroke-linecap="round"/>
    <circle cx="-58" cy="57" r="5" fill="#283593"/>
  </g>
</svg>
