<div *myFor="let item of items(); let i = index; let l = last; trackBy (i, j) => i"></div>

<div *ngFor="let item of items(); let i = index; let l = last; trackBy (i, j) => i">

</div>

<div *myIf="value() as ourVal">
  {{ ourVal }}
</div>


<div *myTimer="times() as interval; from: 10 as startingPoint; to: 0; step: -1; 
    let count = value; let status = state">
  Count: {{ count() }} ({{status()}})
  Interval: {{ interval() }}
</div>

<div
  *myRepeat="5 as total; start: 6; skip: 2; 
    let value; let i = index; 
    let isFirst = first; let isLast = last"
>
  {{i()}} (of {{total()}}) - Repeating text value {{ value() }}, First: {{ isFirst()}}, Last: {{ isLast() }}
</div>

<ng-template 
  [myRepeat]="5" 
  [myRepeatStart]="6" 
  [myRepeatSkip]="2" 
  let-value
  let-i="index"
  let-isFirst="first"
  let-isLast="last"
  let-total="myRepeat"
  >
  <div>  
    {{i()}} - Repeating text value {{ value() }}, First: {{ isFirst()}}, Last: {{ isLast() }}
  </div>
</ng-template>
