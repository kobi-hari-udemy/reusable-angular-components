<div *myFor></div>

<div *myIf></div>

<div *myTimer="1000; from: 10; to: 0; step: -1; 
    let count = value; let status = state">
  Count: {{ count }} ({{status}})
</div>

<div
  *myRepeat="5; start: 6; skip: 2; 
    let value; let i = index; 
    let isFirst = first; let isLast = last"
>
  {{i}} - Repeating text value {{ value }}, First: {{ isFirst}}, Last: {{ isLast }}
</div>

<ng-template 
  [myRepeat]="5" 
  [myRepeatStart]="6" 
  [myRepeatSkip]="2" 
  let-value
  let-i="index"
  let-isFirst="first"
  let-isLast="last"
  >
  <div>  
    {{i}} - Repeating text value {{ value }}, First: {{ isFirst}}, Last: {{ isLast }}
  </div>
</ng-template>
