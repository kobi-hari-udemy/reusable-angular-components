<h1>Structural Directives Sample</h1>
<h2>With Date Locale</h2>

<section class="settings" aria-label="Repeat settings">
  <div class="setting-card locale-setting">
    <label for="locale-select">Locale</label>

    <select
      id="locale-select"
      [value]="selectedLocale()"
      (change)="selectedLocale.set($any($event.target).value)"
    >
      @for (locale of locales(); track locale) {
        <option [value]="locale">{{ locale }}</option>
      }
    </select>
  </div>
</section>

<mat-calendar *withDateLocale="selectedLocale()" />
